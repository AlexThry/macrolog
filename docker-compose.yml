services:
  backend:
    build: ./backend
    environment:
      # IMPORTANT: set a long random value, e.g. `openssl rand -hex 32`
      JWT_SECRET: ${JWT_SECRET:-change-me}
      NODE_ENV: production
      PORT: "3000"
    volumes:
      - macrolog-data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  macrolog-data:
