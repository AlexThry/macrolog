services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      # IMPORTANT: set a long random value, e.g. `openssl rand -hex 32`
      JWT_SECRET: ${JWT_SECRET:-change-me}
      NODE_ENV: production
      PORT: "3000"
    volumes:
      - macrolog-data:/data
    restart: unless-stopped

volumes:
  macrolog-data:
